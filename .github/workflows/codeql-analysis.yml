name: "CodeQL"

on:
  workflow_dispatch:  # Ручной запуск через GitHub UI
  pull_request:
    branches: [master]
  push:
    tags:
      - 'v*'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'cpp']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # CodeQL для Rust находится в бета-режиме, используем cpp для анализа C-подобного кода
          # Для JavaScript/TypeScript используется стандартный анализ

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
