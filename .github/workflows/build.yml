name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os: windows
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Strip 'v' prefix from tag (v1.2.3 -> 1.2.3)
            VERSION=${GITHUB_REF_NAME#v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Using tag version: $VERSION"
          else
            # Use default dev version for PRs and manual runs
            echo "VERSION=0.3.0-dev" >> $GITHUB_OUTPUT
            echo "Using dev version"
          fi
        shell: bash

      - name: Set version
        run: node scripts/set-version.cjs "${{ steps.get_version.outputs.VERSION }}" "${{ github.sha }}"

      - name: Verify native build tools
        shell: pwsh
        run: |
          cmake --version
          $libclang = @(
            'C:\Program Files\LLVM\bin\libclang.dll',
            'C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\Llvm\x64\bin\libclang.dll'
          ) | ForEach-Object { Get-ChildItem $_ -ErrorAction SilentlyContinue } | Select-Object -First 1
          if (-not $libclang) { throw 'libclang.dll not found for espeak-rs-sys bindgen' }
          "LIBCLANG_PATH=$($libclang.DirectoryName)" >> $env:GITHUB_ENV
          Write-Host "Using $($libclang.FullName)"

      - name: Build application
        run: .\scripts\build.ps1 -Mode release
        shell: pwsh
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Create resources zip
        run: |
          cd src-tauri/target/release
          7z a resources.zip resources
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-windows-${{ matrix.target }}
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/resources.zip
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
