<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + Vue + Typescript App</title>
    <!-- Apply theme immediately before Vue loads to prevent flash -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('app-theme') || 'dark';
        console.log('[index.html] Applying theme from localStorage:', savedTheme);
        document.documentElement.setAttribute('data-theme', savedTheme);
        console.log('[index.html] data-theme attribute is now:', document.documentElement.getAttribute('data-theme'));
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
